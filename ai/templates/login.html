<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-orb"></div>
    <div class="auth-orb2"></div>
    <div class="auth-quote">
      <i class="fas fa-bolt"></i>
      <p>Sign in with your email, or use the fixed admin credentials to open the admin panel.</p>
      <span class="quote-author">— AI Recruitment System</span>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <div class="auth-logo-wrap">
        <span class="logo-icon"><i class="fas fa-bolt"></i></span>
        <span class="logo-text">AI Recruitment<em> System</em></span>
      </div>
      <h1>Welcome back</h1>
      <p class="auth-sub">Sign in to continue as a candidate, HR, or admin.</p>

      {% if error %}
        <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
      {% endif %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label>Email address or Admin ID</label>
          <input type="text" name="identifier" placeholder="you@example.com" required autofocus/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="pwd" name="password" placeholder="••••••••" required/>
            <button type="button" class="pw-toggle" onclick="togglePwd()"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-full btn-lg" type="submit"><i class="fas fa-sign-in-alt"></i> Sign In</button>
      </form>

      <div class="auth-switch mt-3" style="display:flex;flex-direction:column;gap:8px;text-align:center;">
        <a href="/forgot-password" style="color:var(--text3);font-size:13px;"><i class="fas fa-lock"></i> Forgot password?</a>
        <span>Don't have an account? <a href="/register">Create one free</a></span>
      </div>

      <div style="text-align:center;margin-top:20px;">
        <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const s = localStorage.getItem("theme") || "dark";
  document.documentElement.setAttribute("data-theme", s);
  document.getElementById("theme-toggle").textContent = s === "dark" ? "☀️" : "🌙";
})();
function toggleTheme(){
  const h = document.documentElement;
  const n = h.getAttribute("data-theme") === "dark" ? "light" : "dark";
  h.setAttribute("data-theme", n);
  localStorage.setItem("theme", n);
  document.getElementById("theme-toggle").textContent = n === "dark" ? "☀️" : "🌙";
}
function togglePwd(){
  const i = document.getElementById("pwd");
  i.type = i.type === "password" ? "text" : "password";
}
</script>
</body>
</html>
