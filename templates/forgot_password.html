<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-orb"></div>
    <div class="auth-orb2"></div>
    <div class="auth-quote">
      <i class="fas fa-lock"></i>
      <p>"Don't worry — it happens to the best of us. Let's get you back in."</p>
      <span class="quote-author">— AI Recruitment System</span>
    </div>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <div class="auth-logo-wrap">
        <span class="logo-icon"><i class="fas fa-bolt"></i></span>
        <span class="logo-text">AI Recruitment<em> System</em></span>
      </div>
      <h1>Forgot Password</h1>
      <p class="auth-sub">Enter your email to receive a password reset OTP</p>

      {% if error %}<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>{% endif %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" placeholder="you@example.com" required autofocus/>
        </div>
        <button class="btn btn-primary w-full btn-lg" type="submit"><i class="fas fa-paper-plane"></i> Send OTP</button>
      </form>
      <div class="auth-switch"><a href="/"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
    </div>
  </div>
</div>
<script>
(function(){ const s=localStorage.getItem("theme")||"dark"; document.documentElement.setAttribute("data-theme",s); })();
</script>
</body>
</html>
