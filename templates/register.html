<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-orb"></div>
    <div class="auth-orb2"></div>
    <div class="auth-quote">
      <i class="fas fa-rocket"></i>
      <p>"Your AI-powered career journey starts here. Upload. Apply. Get hired."</p>
      <span class="quote-author">— AI Recruitment System</span>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <div class="auth-logo-wrap">
        <span class="logo-icon"><i class="fas fa-bolt"></i></span>
        <span class="logo-text">AI Recruitment<em> System</em></span>
      </div>
      <h1>Create Account</h1>
      <p class="auth-sub">Join the AI Recruitment platform today</p>

      <div id="err" class="alert alert-error" style="display:none;"></div>
      <div id="ok"  class="alert alert-success" style="display:none;"></div>

      <!-- Step 1 -->
      <div id="step1" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Jane Doe" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required/>
        </div>
        <div class="form-group">
          <label>I am a…</label>
          <div class="user-type-select">
            <label class="type-option">
              <input type="radio" name="role" id="role_cand" value="candidate" checked onchange="toggleCompany()">
              <div class="type-card">
                <i class="fas fa-user-tie"></i>
                <strong>Candidate</strong>
                <small>Looking for jobs</small>
              </div>
            </label>
            <label class="type-option">
              <input type="radio" name="role" id="role_hr" value="hr" onchange="toggleCompany()">
              <div class="type-card">
                <i class="fas fa-building"></i>
                <strong>HR / Recruiter</strong>
                <small>Hiring talent</small>
              </div>
            </label>
          </div>
        </div>
        <div id="company_wrap" class="form-group" style="display:none;">
          <label>Company Name</label>
          <input type="text" id="company_name" placeholder="Acme Corp"/>
        </div>
        <button class="btn btn-primary w-full" onclick="sendOtp()"><i class="fas fa-envelope"></i> Send OTP</button>
      </div>

      <!-- Step 2: OTP -->
      <div id="step2" class="auth-form" style="display:none;">
        <div class="form-group">
          <label>Enter OTP sent to your email</label>
          <input type="text" id="otp_input" placeholder="6-digit code" maxlength="6" style="letter-spacing:6px;font-size:20px;text-align:center;"/>
        </div>
        <button class="btn btn-primary w-full" onclick="verifyOtp()"><i class="fas fa-check-circle"></i> Verify OTP</button>
        <button class="btn btn-ghost w-full mt-2" onclick="goBack()"><i class="fas fa-arrow-left"></i> Back</button>
      </div>

      <!-- Step 3: Password -->
      <div id="step3" class="auth-form" style="display:none;">
        <div class="form-group">
          <label>Create Password</label>
          <div class="pw-wrap">
            <input type="password" id="pwd" placeholder="Min 6 characters" required/>
            <button type="button" class="pw-toggle" onclick="togglePwd('pwd')"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="pwd2" placeholder="Repeat password" required/>
            <button type="button" class="pw-toggle" onclick="togglePwd('pwd2')"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-full" onclick="submitReg()"><i class="fas fa-user-plus"></i> Create Account</button>
      </div>

      <div class="auth-switch">Already have an account? <a href="/">Sign in</a></div>

      <div style="text-align:center;margin-top:16px;">
        <button class="theme-btn" onclick="toggleTheme()" id="theme-toggle" title="Toggle theme">🌙</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const s = localStorage.getItem("theme")||"dark";
  document.documentElement.setAttribute("data-theme",s);
  document.getElementById("theme-toggle").textContent = s==="dark"?"☀️":"🌙";
})();
function toggleTheme(){ const h=document.documentElement, n=h.getAttribute("data-theme")==="dark"?"light":"dark"; h.setAttribute("data-theme",n); localStorage.setItem("theme",n); document.getElementById("theme-toggle").textContent=n==="dark"?"☀️":"🌙"; }
function togglePwd(id){ const i=document.getElementById(id); i.type=i.type==="password"?"text":"password"; }
function toggleCompany(){ document.getElementById("company_wrap").style.display = document.querySelector('input[name="role"]:checked').value==="hr"?"block":"none"; }
function showErr(msg){ const e=document.getElementById("err"); e.innerHTML='<i class="fas fa-exclamation-circle"></i> '+msg; e.style.display="flex"; }
function showOk(msg){ const e=document.getElementById("ok"); e.innerHTML='<i class="fas fa-check-circle"></i> '+msg; e.style.display="flex"; }
function clearMsgs(){ document.getElementById("err").style.display="none"; document.getElementById("ok").style.display="none"; }
function goBack(){ clearMsgs(); document.getElementById("step2").style.display="none"; document.getElementById("step1").style.display="flex"; }

async function sendOtp(){
  clearMsgs();
  const name=document.getElementById("name").value.trim();
  const email=document.getElementById("email").value.trim();
  if(!name||!email){ showErr("Name and email are required"); return; }
  const btn=document.querySelector("#step1 button:last-child");
  btn.textContent="Sending…"; btn.disabled=true;
  try{
    const r=await fetch("/send_otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
    const d=await r.json();
    if(d.success){ document.getElementById("step1").style.display="none"; document.getElementById("step2").style.display="flex"; showOk("OTP sent to "+email+" — check inbox & spam."); }
    else{ showErr(d.message||"Failed to send OTP"); btn.innerHTML='<i class="fas fa-envelope"></i> Send OTP'; btn.disabled=false; }
  }catch(e){ showErr("Network error. Please try again."); btn.innerHTML='<i class="fas fa-envelope"></i> Send OTP'; btn.disabled=false; }
}

async function verifyOtp(){
  clearMsgs();
  const otp=document.getElementById("otp_input").value.trim();
  if(!otp||otp.length<6){ showErr("Enter the 6-digit OTP"); return; }
  const r=await fetch("/verify_otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({otp})});
  const d=await r.json();
  if(d.success){ document.getElementById("step2").style.display="none"; document.getElementById("step3").style.display="flex"; showOk("Email verified! Set your password."); }
  else showErr(d.message||"Invalid OTP");
}

async function submitReg(){
  clearMsgs();
  const pwd=document.getElementById("pwd").value;
  const pwd2=document.getElementById("pwd2").value;
  if(pwd!==pwd2){ showErr("Passwords do not match"); return; }
  if(pwd.length<6){ showErr("Password must be at least 6 characters"); return; }
  const payload={
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    password: pwd,
    role: document.querySelector('input[name="role"]:checked').value,
    company_name: document.getElementById("company_name").value.trim()
  };
  const r=await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
  const d=await r.json();
  if(d.success){ showOk("Account created! Redirecting to login…"); setTimeout(()=>window.location="/",1400); }
  else showErr(d.message||"Registration failed");
}
</script>
</body>
</html>
