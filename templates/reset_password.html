<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-visual">
    <div class="auth-orb"></div>
    <div class="auth-quote">
      <i class="fas fa-key"></i>
      <p>"A fresh start is just a new password away."</p>
      <span class="quote-author">— AI Recruitment System</span>
    </div>
  </div>
  <div class="auth-form-wrap">
    <div class="auth-form-inner">
      <div class="auth-logo-wrap">
        <span class="logo-icon"><i class="fas fa-bolt"></i></span>
        <span class="logo-text">AI Recruitment<em> System</em></span>
      </div>
      <h1>Set New Password</h1>
      <p class="auth-sub">Choose a strong new password for your account</p>

      {% if error %}<div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>{% endif %}
      {% if success %}<div class="alert alert-success"><i class="fas fa-check-circle"></i> {{ success }}</div>{% endif %}

      <form method="POST" class="auth-form">
        <div class="form-group">
          <label>New Password</label>
          <div class="pw-wrap">
            <input type="password" id="pwd" name="password" placeholder="Min 6 characters" required/>
            <button type="button" class="pw-toggle" onclick="togglePwd('pwd')"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="pw-wrap">
            <input type="password" id="pwd2" name="confirm_password" placeholder="Repeat password" required/>
            <button type="button" class="pw-toggle" onclick="togglePwd('pwd2')"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-full btn-lg" type="submit"><i class="fas fa-lock"></i> Reset Password</button>
      </form>
      <div class="auth-switch"><a href="/"><i class="fas fa-arrow-left"></i> Back to Login</a></div>
    </div>
  </div>
</div>
<script>
(function(){ const s=localStorage.getItem("theme")||"dark"; document.documentElement.setAttribute("data-theme",s); })();
function togglePwd(id){ const i=document.getElementById(id); i.type=i.type==="password"?"text":"password"; }
</script>
</body>
</html>
