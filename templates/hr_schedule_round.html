{% extends "base.html" %}
{% block title %}Schedule HR Interview{% endblock %}
{% block content %}
<div class="dashboard-layout">
  <aside class="dash-sidebar">
    <div class="dash-profile"><div class="dash-avatar">{{ session.user.name[0]|upper }}</div><div class="dash-user-info"><strong>{{ session.user.name }}</strong><small>HR</small></div></div>
    <a href="/dashboard"          class="dash-nav-link"><i class="fas fa-tachometer-alt"></i> Overview</a>
    <a href="/hr_tech_submissions"class="dash-nav-link active"><i class="fas fa-laptop-code"></i> Tech Results</a>
    <a href="/hr_applications"    class="dash-nav-link"><i class="fas fa-users"></i> Applications</a>
    <hr style="border-color:var(--border);margin:10px 0;">
    <a href="/logout" class="dash-nav-link text-danger"><i class="fas fa-sign-out-alt"></i> Logout</a>
  </aside>
  <div class="dash-main">
    <div class="dash-header"><h1>Schedule HR Interview</h1></div>
    <div class="dash-section" style="max-width:500px;">
      <div class="alert alert-info mb-3"><i class="fas fa-user"></i> <strong>{{ candidate.name }}</strong> — {{ application.job_title }}</div>
      <form method="POST">
        <div class="form-group"><label>Interview Date</label><input type="date" name="date" required/></div>
        <div class="form-group"><label>Interview Time</label><input type="time" name="time" required/></div>
        <div class="form-actions">
          <a href="/hr_tech_submissions" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>
          <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-calendar-check"></i> Schedule & Notify</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
